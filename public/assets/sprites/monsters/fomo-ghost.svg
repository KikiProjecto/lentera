<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="fomoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DB2777;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#9D174D;stop-opacity:0.9" />
    </linearGradient>
    <filter id="fomoGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Ghost body -->
  <path d="M45 45 Q30 50 30 80 Q30 110 45 115 Q55 120 64 115 Q73 120 83 115 Q98 110 98 80 Q98 50 83 45 Q75 35 64 38 Q53 35 45 45" 
        fill="url(#fomoGrad)" filter="url(#fomoGlow)" opacity="0.85"/>
  <!-- Face -->
  <ellipse cx="64" cy="55" rx="22" ry="18" fill="#FDF2F8" opacity="0.9"/>
  <!-- Eyes (scared look) -->
  <ellipse cx="52" cy="52" rx="8" ry="10" fill="#0A0A0F"/>
  <ellipse cx="76" cy="52" rx="8" ry="10" fill="#0A0A0F"/>
  <circle cx="54" cy="50" r="3" fill="#FFFFFF"/>
  <circle cx="78" cy="50" r="3" fill="#FFFFFF"/>
  <!-- Wavy bottom -->
  <path d="M45 115 Q50 120 55 115 Q60 110 65 115 Q70 120 75 115 Q80 110 83 115" 
        stroke="#DB2777" stroke-width="2" fill="none"/>
  <!-- Flashing effect -->
  <circle cx="40" cy="40" r="5" fill="#F472B6" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="88" cy="40" r="5" fill="#F472B6" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1s" repeatCount="indefinite"/>
  </circle>
  <!-- Glow aura -->
  <ellipse cx="64" cy="75" rx="45" ry="35" fill="#DB2777" opacity="0.15"/>
</svg>