<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="rugGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4C1D95;stop-opacity:1" />
    </linearGradient>
    <filter id="rugGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Cloak -->
  <path d="M40 50 Q30 80 35 110 Q64 125 93 110 Q98 80 88 50 Q64 40 40 50" 
        fill="url(#rugGrad)" filter="url(#rugGlow)"/>
  <!-- Hood -->
  <ellipse cx="64" cy="40" rx="25" ry="22" fill="#4C1D95"/>
  <!-- Face shadow -->
  <ellipse cx="64" cy="42" rx="18" ry="15" fill="#1E1B4B"/>
  <!-- Eyes (glowing red) -->
  <ellipse cx="54" cy="40" rx="6" ry="4" fill="#DC2626"/>
  <ellipse cx="74" cy="40" rx="6" ry="4" fill="#DC2626"/>
  <circle cx="55" cy="40" r="2" fill="#EF4444"/>
  <circle cx="73" cy="40" r="2" fill="#EF4444"/>
  <!-- Evil grin -->
  <path d="M54 50 Q64 58 74 50" stroke="#DC2626" stroke-width="2" fill="none"/>
  <path d="M56 52 L58 56" stroke="#DC2626" stroke-width="1"/>
  <path d="M70 52 L72 56" stroke="#DC2626" stroke-width="1"/>
  <!-- Hands (reaching) -->
  <ellipse cx="30" cy="70" rx="8" ry="12" fill="#1E1B4B"/>
  <ellipse cx="98" cy="70" rx="8" ry="12" fill="#1E1B4B"/>
  <!-- Floating animation -->
  <ellipse cx="64" cy="100" rx="40" ry="8" fill="#7C3AED" opacity="0.2"/>
</svg>