<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="slotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#991B1B;stop-opacity:1" />
    </linearGradient>
    <filter id="slotGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Body -->
  <ellipse cx="64" cy="75" rx="28" ry="30" fill="url(#slotGrad)" filter="url(#slotGlow)"/>
  <!-- Head -->
  <circle cx="64" cy="45" r="20" fill="#DC2626"/>
  <!-- Eyes (slot machine style) -->
  <rect x="48" y="38" width="12" height="16" rx="2" fill="#0A0A0F"/>
  <rect x="68" y="38" width="12" height="16" rx="2" fill="#0A0A0F"/>
  <!-- Slot numbers in eyes -->
  <text x="54" y="50" font-size="10" fill="#EF4444" text-anchor="middle">7</text>
  <text x="74" y="50" font-size="10" fill="#EF4444" text-anchor="middle">7</text>
  <!-- Mouth -->
  <rect x="54" y="55" width="20" height="10" rx="3" fill="#0A0A0F"/>
  <text x="64" y="62" font-size="8" fill="#FFBE0B" text-anchor="middle">💰</text>
  <!-- Crown/spikes -->
  <path d="M48 30 L50 20 L56 28" fill="#991B1B"/>
  <path d="M56 28 L64 15 L72 28" fill="#991B1B"/>
  <path d="M72 28 L80 20 L80 30" fill="#991B1B"/>
  <!-- Machine elements on body -->
  <rect x="50" y="70" width="28" height="12" rx="2" fill="#0A0A0F" opacity="0.5"/>
  <circle cx="55" cy="76" r="3" fill="#EF4444"/>
  <circle cx="64" cy="76" r="3" fill="#FCD34D"/>
  <circle cx="73" cy="76" r="3" fill="#22C55E"/>
  <!-- Glow -->
  <ellipse cx="64" cy="90" rx="30" ry="10" fill="#DC2626" opacity="0.2"/>
</svg>