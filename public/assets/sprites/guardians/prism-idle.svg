<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="prismGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#22D3EE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#67E8F9;stop-opacity:1" />
    </linearGradient>
    <filter id="prismGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Crystal body -->
  <polygon points="64,20 90,50 90,90 64,120 38,90 38,50" fill="url(#prismGrad)" filter="url(#prismGlow)" opacity="0.9"/>
  <!-- Inner facets -->
  <polygon points="64,35 80,55 80,85 64,105 48,85 48,55" fill="none" stroke="#22D3EE" stroke-width="1" opacity="0.6"/>
  <!-- Core light -->
  <circle cx="64" cy="65" r="12" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="64" cy="65" r="8" fill="#67E8F9"/>
  <circle cx="64" cy="65" r="4" fill="#FFFFFF"/>
  <!-- Prismatic rays -->
  <line x1="64" y1="20" x2="64" y2="10" stroke="#22D3EE" stroke-width="2" opacity="0.5"/>
  <line x1="90" y1="50" x2="98" y2="45" stroke="#22D3EE" stroke-width="2" opacity="0.5"/>
  <line x1="38" y1="50" x2="30" y2="45" stroke="#22D3EE" stroke-width="2" opacity="0.5"/>
  <!-- Glow aura -->
  <ellipse cx="64" cy="70" rx="45" ry="45" fill="#06B6D4" opacity="0.15"/>
  <ellipse cx="64" cy="70" rx="55" ry="55" fill="#06B6D4" opacity="0.08"/>
</svg>