<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="flameGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FCA5A5;stop-opacity:1" />
    </linearGradient>
    <filter id="flameGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Flame body -->
  <path d="M64 100 Q45 90 50 65 Q40 45 55 30 Q64 15 73 30 Q88 45 78 65 Q83 90 64 100" 
        fill="url(#flameGrad)" filter="url(#flameGlow)"/>
  <!-- Inner flame -->
  <path d="M64 95 Q55 85 58 70 Q52 55 62 45 Q64 35 66 45 Q76 55 70 70 Q73 85 64 95" 
        fill="#FCA5A5" opacity="0.8"/>
  <!-- Core -->
  <circle cx="64" cy="55" r="8" fill="#FEF3C7"/>
  <circle cx="64" cy="55" r="5" fill="#FDE68A"/>
  <!-- Eyes -->
  <ellipse cx="58" cy="60" rx="3" ry="4" fill="#1E1B4B"/>
  <ellipse cx="70" cy="60" rx="3" ry="4" fill="#1E1B4B"/>
  <circle cx="59" cy="59" r="1.5" fill="#FCA5A5"/>
  <circle cx="71" cy="59" r="1.5" fill="#FCA5A5"/>
  <!-- Sparkles -->
  <circle cx="45" cy="35" r="2" fill="#FFBE0B" opacity="0.8"/>
  <circle cx="80" cy="40" r="1.5" fill="#FFBE0B" opacity="0.7"/>
  <circle cx="55" cy="20" r="1" fill="#FFBE0B" opacity="0.6"/>
  <!-- Glow aura -->
  <ellipse cx="64" cy="70" rx="35" ry="35" fill="#EF4444" opacity="0.25"/>
  <ellipse cx="64" cy="70" rx="45" ry="45" fill="#EF4444" opacity="0.12"/>
</svg>