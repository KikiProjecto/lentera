<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="orangGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    <filter id="orangGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Body -->
  <ellipse cx="64" cy="75" rx="30" ry="28" fill="url(#orangGrad)" filter="url(#orangGlow)"/>
  <!-- Head -->
  <circle cx="64" cy="45" r="20" fill="#F59E0B"/>
  <!-- Face (lighter) -->
  <ellipse cx="64" cy="50" rx="14" ry="12" fill="#FCD34D"/>
  <!-- Eyes -->
  <circle cx="56" cy="46" r="4" fill="#1E1B4B"/>
  <circle cx="72" cy="46" r="4" fill="#1E1B4B"/>
  <circle cx="57" cy="45" r="1.5" fill="#0A0A0F"/>
  <circle cx="73" cy="45" r="1.5" fill="#0A0A0F"/>
  <!-- Nose -->
  <ellipse cx="64" cy="52" rx="3" ry="2" fill="#B45309"/>
  <!-- Mouth -->
  <path d="M58 56 Q64 60 70 56" stroke="#B45309" stroke-width="2" fill="none"/>
  <!-- Fur/hair -->
  <path d="M50 35 Q52 25 64 28 Q76 25 78 35" fill="#D97706"/>
  <path d="M48 40 Q46 30 54 35" fill="#D97706"/>
  <path d="M80 40 Q82 30 74 35" fill="#D97706"/>
  <!-- Arms -->
  <ellipse cx="35" cy="70" rx="10" ry="18" fill="#D97706"/>
  <ellipse cx="93" cy="70" rx="10" ry="18" fill="#D97706"/>
  <!-- Glow -->
  <ellipse cx="64" cy="90" rx="35" ry="10" fill="#F59E0B" opacity="0.2"/>
</svg>