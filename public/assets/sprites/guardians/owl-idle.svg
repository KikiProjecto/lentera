<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="owlGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <filter id="owlGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Body -->
  <ellipse cx="64" cy="70" rx="28" ry="32" fill="url(#owlGrad)" filter="url(#owlGlow)"/>
  <!-- Head -->
  <circle cx="64" cy="42" r="22" fill="#A78BFA"/>
  <!-- Ear tufts -->
  <path d="M45 30 L42 18 L52 28 Z" fill="#7C3AED"/>
  <path d="M83 30 L86 18 L76 28 Z" fill="#7C3AED"/>
  <!-- Eyes (large owl eyes) -->
  <circle cx="54" cy="40" r="8" fill="#1E1B4B"/>
  <circle cx="74" cy="40" r="8" fill="#1E1B4B"/>
  <circle cx="54" cy="40" r="4" fill="#FFBE0B"/>
  <circle cx="74" cy="40" r="4" fill="#FFBE0B"/>
  <circle cx="55" cy="39" r="2" fill="#0A0A0F"/>
  <circle cx="75" cy="39" r="2" fill="#0A0A0F"/>
  <!-- Beak -->
  <path d="M64 48 L60 54 L68 54 Z" fill="#F59E0B"/>
  <!-- Wings -->
  <ellipse cx="35" cy="70" rx="8" ry="20" fill="#7C3AED" opacity="0.7"/>
  <ellipse cx="93" cy="70" rx="8" ry="20" fill="#7C3AED" opacity="0.7"/>
  <!-- Glow -->
  <ellipse cx="64" cy="85" rx="35" ry="8" fill="#A78BFA" opacity="0.2"/>
</svg>